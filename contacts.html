<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Contacts — Momentum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--font:'Space Grotesk',system-ui,sans-serif}
body{font-family:var(--font);background:#000;color:#fff;min-height:100vh}

/* LOGIN */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000;z-index:100}
.login-box{width:100%;max-width:400px;padding:0 24px}
.login-logo{font-size:13px;font-weight:700;letter-spacing:.42em;margin-bottom:52px;opacity:.55}
.login-label{font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:20px}
.login-form{display:flex;border:1px solid rgba(255,255,255,.18)}
.login-input{flex:1;padding:16px 20px;background:transparent;border:none;outline:none;font-family:var(--font);font-size:15px;color:#fff}
.login-input::placeholder{color:rgba(255,255,255,.25)}
.login-btn{padding:0 24px;background:transparent;border:none;border-left:1px solid rgba(255,255,255,.18);color:#fff;font-family:var(--font);font-size:12px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:background .2s}
.login-btn:hover{background:rgba(255,255,255,.07)}
.login-error{font-size:12px;color:rgba(255,100,100,.7);margin-top:14px;letter-spacing:.04em;min-height:18px}

/* ADMIN */
#admin{display:none;padding:64px 52px 100px}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:52px;padding-bottom:28px;border-bottom:1px solid rgba(255,255,255,.08)}
.admin-logo{font-size:13px;font-weight:700;letter-spacing:.42em}
.admin-title{font-size:11px;letter-spacing:.38em;text-transform:uppercase;color:rgba(255,255,255,.3);margin-top:6px}
.admin-actions{display:flex;gap:16px}
.btn-ghost{padding:10px 22px;border:1px solid rgba(255,255,255,.18);background:transparent;color:rgba(255,255,255,.6);font-family:var(--font);font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-ghost:hover{border-color:rgba(255,255,255,.5);color:#fff}
.btn-danger{padding:10px 22px;border:1px solid rgba(255,80,80,.3);background:transparent;color:rgba(255,100,100,.7);font-family:var(--font);font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s}
.btn-danger:hover{border-color:rgba(255,80,80,.6);color:rgba(255,100,100,1)}
.stat-row{display:flex;gap:52px;margin-bottom:52px}
.stat-item{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.3)}
.stat-item strong{display:block;font-size:36px;font-weight:700;letter-spacing:-.03em;color:#fff;margin-bottom:4px}
.empty{padding:80px 0;text-align:center;color:rgba(255,255,255,.2);font-size:14px;letter-spacing:.08em}
table{width:100%;border-collapse:collapse}
thead th{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:14px 20px;text-align:left;border-bottom:1px solid rgba(255,255,255,.08)}
tbody tr{border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody td{padding:18px 20px;font-size:14px;color:rgba(255,255,255,.75)}
td.td-num{font-size:11px;color:rgba(255,255,255,.25);width:52px}
td.td-date{font-size:12px;color:rgba(255,255,255,.38);white-space:nowrap}
td.td-email{font-weight:500}
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <div class="login-box">
    <p class="login-logo">MOMENTUM</p>
    <p class="login-label">Admin Access</p>
    <form class="login-form" id="login-form">
      <input class="login-input" type="password" id="pw-input" placeholder="Password" autocomplete="current-password">
      <button class="login-btn" type="submit">Enter</button>
    </form>
    <p class="login-error" id="login-error"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
  <div class="admin-header">
    <div>
      <p class="admin-logo">MOMENTUM</p>
      <p class="admin-title">Contact Submissions</p>
    </div>
    <div class="admin-actions">
      <button class="btn-ghost" id="export-btn">Export CSV</button>
      <button class="btn-danger" id="clear-btn">Clear All</button>
    </div>
  </div>
  <div class="stat-row">
    <div class="stat-item"><strong id="total-count">0</strong>Total</div>
  </div>
  <div id="table-wrap"></div>
</div>

<script>
const PASSWORD = 'momentum2026'; // change this

function render(contacts){
  const wrap=document.getElementById('table-wrap');
  document.getElementById('total-count').textContent=contacts.length;
  if(!contacts.length){wrap.innerHTML='<p class="empty">No submissions yet.</p>';return;}
  const rows=contacts.slice().reverse().map((c,i)=>`
    <tr>
      <td class="td-num">${contacts.length-i}</td>
      <td class="td-email">${esc(c.email)}</td>
      <td class="td-date">${esc(c.date)}</td>
    </tr>`).join('');
  wrap.innerHTML=`<table><thead><tr><th>#</th><th>Email</th><th>Date</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function load(){return JSON.parse(localStorage.getItem('momentum_contacts')||'[]')}

document.getElementById('login-form').addEventListener('submit',function(e){
  e.preventDefault();
  const val=document.getElementById('pw-input').value;
  if(val===PASSWORD){
    sessionStorage.setItem('m_auth','1');
    document.getElementById('login').style.display='none';
    document.getElementById('admin').style.display='block';
    render(load());
  } else {
    document.getElementById('login-error').textContent='Incorrect password.';
    document.getElementById('pw-input').value='';
  }
});

document.getElementById('export-btn').addEventListener('click',function(){
  const contacts=load();
  if(!contacts.length){alert('No submissions to export.');return;}
  const rows=contacts.map(c=>`"${c.email}","${c.date}"`);
  const csv='Email,Date\n'+rows.join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download='momentum-contacts.csv';
  a.click();
});

document.getElementById('clear-btn').addEventListener('click',function(){
  if(confirm('Delete all submissions? This cannot be undone.')){
    localStorage.removeItem('momentum_contacts');
    render([]);
  }
});

if(sessionStorage.getItem('m_auth')==='1'){
  document.getElementById('login').style.display='none';
  document.getElementById('admin').style.display='block';
  render(load());
}
</script>
</body>
</html>
